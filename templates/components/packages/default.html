<div class="col">
  <div class="training-package card h-100 text-center p-4 shadow-lg" style="--card-gradient: {{PACKAGE_GRADIENT}};">
    <div class="card-body d-flex flex-column justify-content-start">

      <div class="package-number display-6 fw-bold text-primary mb-3">
        {{PACKAGE_NUMBER}}
      </div>

      <h3 class="card-title mb-3">
        {{PACKAGE_TITLE}}
      </h3>

      <p class="text-muted fst-italic mb-2">
        {{PACKAGE_TAGLINE}}
      </p>

      <p class="fw-bold mb-3">
        {{PACKAGE_DURATION}}
      </p>

      <p class="card-text mb-3">
        {{PACKAGE_DESCRIPTION}}
      </p>

      <p class="small text-muted">
        {{PACKAGE_FOCUS}}
      </p>

    </div>
  </div>
</div>
