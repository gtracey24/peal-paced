<div class="col">
  <div class="card h-100 text-center p-5 shadow-lg" style="min-height: 420px;">
    <div class="card-body d-flex flex-column justify-content-center">

      <!-- ICON -->
      <i class="bi {{SERVICE_ICON}} mb-4" style="font-size: 3.5rem; color: var(--bs-primary);"></i>

      <!-- TITLE -->
      <h2 class="card-title mb-3" style="font-size: 2rem;">
        {{SERVICE_TITLE}}
      </h2>

      <!-- DESCRIPTION -->
      <p class="card-text" style="font-size: 1.25rem; line-height: 1.6;">
        {{SERVICE_DESCRIPTION}}
      </p>

    </div>
  </div>
</div>
