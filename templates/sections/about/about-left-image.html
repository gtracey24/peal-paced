<section class="about py-5 fade-scroll">
  <div class="container">
    <div class="row align-items-center">

      <!-- IMAGE + HEADLINE COLUMN -->
      <div class="col-md-4 text-center text-md-start mb-4 mb-md-0">
        <img
          src="{{ABOUT_IMAGE}}"
          alt="About image"
          class="rounded-circle"
          style="width: 320px; height: 320px; object-fit: cover;"
        />
        <h2 class="mt-3">{{ABOUT_HEADLINE}}</h2>
      </div>

      <!-- DESCRIPTION COLUMN -->
      <div class="col-md-8">
        <p class="lead">
          {{ABOUT_DESCRIPTION}}
        </p>
      </div>

    </div>
  </div>
</section>
