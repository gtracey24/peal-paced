<section class="sf-cta-alt py-5 my-6">
  <div class="container">

    <div class="sf-cta-card row align-items-center p-4 mx-auto">

      <!-- Image Column -->
      <div class="col-md-4 text-center mb-4 mb-md-0">
        <img 
          src="{{CTA_IMAGE}}" 
          alt="Coach Image" 
          class="img-fluid rounded"
          style="width: 100%; max-width: 220px; object-fit: cover;"
        />
      </div>

      <!-- Content Column -->
      <div class="col-md-8 text-center text-md-start">

        <h2 class="sf-cta-title">{{CTA_HEADLINE}}</h2>

        <p class="sf-cta-description mt-2">
          {{CTA_DESCRIPTION}}
        </p>

        <!-- <a href="{{CTA_BUTTON_URL}}" class="btn btn-primary sf-cta-btn mt-3">
          {{CTA_BUTTON_LABEL}}
        </a> -->
        
        <ul class="list-unstyled mt-3"><strong>
          <li>{{CTA_NAME}}</li>
          <li>{{CTA_PHONE}}</li>
          <li>{{CTA_EMAIL}}</li>
        </strong></ul>

      </div>

    </div>

  </div>
</section>
