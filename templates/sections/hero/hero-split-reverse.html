<header class="hero-{{HERO_VARIANT}} py-5">
  <div 
    class="container p-5 shadow-sm border rounded-4 hero-animate"
    style="
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(6px);

      /* TEXTURE */
background-image: radial-gradient(rgba(0,0,0,0.18) 1.2px, transparent 1.2px);
background-size: 20px 20px;
    "
  >
    <div class="row align-items-center">

      <div class="col-md-6 text-center mb-4 mb-md-0">
        <img 
          src="{{HERO_IMAGE}}" 
          alt="" 
          class="img-fluid"
          loading="eager"
        />
      </div>

      <div class="col-md-6">
        <h1 class="display-4 mb-3">{{HERO_HEADLINE}}</h1>
        <p class="lead mb-4">{{HERO_SUBHEADLINE}}</p>
        <a href="{{HERO_CTA_URL}}" class="btn btn-primary">
          {{HERO_CTA_LABEL}}
        </a>
      </div>

    </div>
  </div>
</header>
