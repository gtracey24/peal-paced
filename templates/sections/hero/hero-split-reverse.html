<header class="hero-{{HERO_VARIANT}} py-5">
  <div 
    class="container p-5 shadow-sm border rounded-4 hero-animate"
    style="
      background-image: url(/assets/images/track-1.jpg);
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
    "
  >
    <div class="row align-items-center">

      <div class="col-md-6 text-center mb-4 mb-md-0">
        <img 
          src="{{HERO_IMAGE}}" 
          alt="" 
          class="img-fluid"
          loading="eager"
        />
      </div>

      <div class="col-md-6">
        <div class="hero-text-gradient p-4 rounded-4">
          <h1 class="display-4 mb-3">{{HERO_HEADLINE}}</h1>
          <p class="lead mb-4">{{HERO_SUBHEADLINE}}</p>
          <a href="{{HERO_CTA_URL}}" class="btn btn-primary">
            {{HERO_CTA_LABEL}}
          </a>
        </div>
      </div>

    </div>
  </div>
</header>
