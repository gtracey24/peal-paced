<section id="contact" class="sf-card-wrapper my-6 p-3 p-md-5" style="background-color:lightgray">
  <div class="container">
    <div class="sf-card mx-auto p-3 p-md-4 shadow-sm border rounded bg-white" style="max-width: 520px;">

      <h2 class="sf-card-title text-center mb-3">{{FORM_HEADLINE}}</h2>

      <p class="sf-card-text text-center text-muted mb-4">
        {{FORM_DESCRIPTION}}
      </p>

      <form id="contact-form">
        <div class="mb-3">
          <label class="form-label">Your Name</label>
          <input type="text" name="name" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Your Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea name="message" class="form-control" rows="4" required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          {{FORM_BUTTON_LABEL}}
        </button>
      </form>

      <div id="form-status" class="mt-3"></div>

    </div>
  </div>
</section>


<!-- External JS -->
<script src="/js/form-handler.js"></script>
