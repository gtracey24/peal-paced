<section class="about py-5 fade-scroll">
  <div class="container">
    <div class="row align-items-center">

      <!-- IMAGE + HEADLINE COLUMN -->
      <div class="col-lg-4 text-center text-lg-start mb-4 mb-lg-0">
        <img
          src="{{ABOUT_IMAGE}}"
          alt="About image"
          class="rounded-circle"
          style="width: 320px; height: 320px; object-fit: cover;"
        />
        <h2 class="mt-3">{{ABOUT_HEADLINE}}</h2>
      </div>

      <!-- DESCRIPTION COLUMN -->
      <div class="col-lg-8">
        <p class="lead" style="overflow-wrap: break-word; word-break: break-word;">
          {{ABOUT_DESCRIPTION}}
        </p>
      </div>

    </div>
  </div>
</section>
