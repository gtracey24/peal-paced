<section class="about py-5">
  <div class="container text-center">
    <img 
      src="{{ABOUT_IMAGE}}" 
      alt="Profile photo" 
      class="rounded-circle mb-4 img-fluid"
      style="width: 160px; height: 160px; object-fit: cover;"
    />

    <h2 class="mb-3" style="word-wrap: break-word; overflow-wrap: break-word;">
      {{ABOUT_HEADLINE}}
    </h2>

    <p class="lead mx-auto" style="max-width: 600px; word-wrap: break-word; overflow-wrap: break-word;">
      {{ABOUT_DESCRIPTION}}
    </p>
  </div>
</section>
